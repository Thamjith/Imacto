<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="canonical" href="https://imacto.thamjiththaha.com/" />

    <!-- Primary SEO -->
    <title>Imacto Studio — private, in-browser image editor</title>
    <meta
      name="description"
      content="Imacto Studio is a free, privacy-first image editor that runs entirely in your browser. Crop, resize, compress, convert formats, rotate, and remove backgrounds — no uploads, your files never leave your device."
    />
    <meta
      name="keywords"
      content="image editor, background remover, crop image, resize image, compress image, convert image, webp converter, remove background online, browser image editor, private image editor"
    />
    <meta name="author" content="Imacto" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#0e0f12" />
    <meta name="color-scheme" content="dark light" />
    <meta name="application-name" content="Imacto Studio" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Imacto" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Imacto Studio" />
    <meta property="og:title" content="Imacto Studio — private, in-browser image editor" />
    <meta
      property="og:description"
      content="Crop, resize, compress, convert, rotate, and remove image backgrounds — 100% in your browser. Your files never leave your device."
    />
    <meta property="og:url" content="https://imacto.thamjiththaha.com/" />
    <meta property="og:image" content="https://imacto.thamjiththaha.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://imacto.thamjiththaha.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Imacto Studio — crop, compress, convert and remove backgrounds in your browser" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Imacto Studio — private, in-browser image editor" />
    <meta
      name="twitter:description"
      content="Crop, resize, compress, convert, rotate, and remove image backgrounds — 100% in your browser. Your files never leave your device."
    />
    <meta name="twitter:image" content="https://imacto.thamjiththaha.com/og-image.png" />
    <meta name="twitter:image:alt" content="Imacto Studio — crop, compress, convert and remove backgrounds in your browser" />

    <!-- Structured data: WebApplication (rich results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Imacto Studio",
        "url": "https://imacto.thamjiththaha.com/",
        "description": "A privacy-first, in-browser image editor to crop, resize, compress, convert, rotate, and remove backgrounds. All processing runs locally — files never leave your device.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and a modern browser",
        "image": "https://imacto.thamjiththaha.com/og-image.png",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Crop & resize",
          "Compress",
          "Convert format (WebP, AVIF, PNG, JPG)",
          "Rotate & flip",
          "Background removal (on-device AI)"
        ]
      }
    </script>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
